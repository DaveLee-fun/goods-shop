<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>로그인 · 굿즈샵</title>
  <link rel="stylesheet" href="./css/styles.css" />
</head>
<body>
  <div id="header"></div>
  <main class="container">
    <form id="login-form" class="form-card">
      <h1>로그인</h1>
      <div id="alert"></div>
      <div class="form-row">
        <input type="email" name="email" placeholder="이메일" required autocomplete="username" />
      </div>
      <div class="form-row">
        <input type="password" name="password" placeholder="비밀번호" required autocomplete="current-password" />
      </div>
      <button id="submit" type="submit" class="btn btn-primary btn-block">로그인</button>
      <p class="form-help">계정이 없으신가요? <a href="signup.html">회원가입</a></p>
    </form>
  </main>
  <div class="footer">© 2026 goods-shop</div>

  <script type="module" src="./js/header.js"></script>
  <script type="module" src="./js/login.js"></script>
</body>
</html>
